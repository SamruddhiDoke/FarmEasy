# ============================================================
# PRODUCTION PROFILE - Google Cloud Run
# Activated by: SPRING_PROFILES_ACTIVE=prod
# Database: Google Cloud SQL (MySQL) via Unix Socket Factory
# Required Cloud Run flags:
#   --add-cloudsql-instances=farmeasy-495005:us-central1:farmeasy-db-instance
# Required environment variables in Cloud Run:
#   SPRING_PROFILES_ACTIVE=prod
#   SPRING_DATASOURCE_USERNAME=root
#   SPRING_DATASOURCE_PASSWORD=<secret>
#   JWT_SECRET=<secret>
# ============================================================
spring:
  cloud:
    gcp:
      sql:
        # The Cloud SQL instance connection name in the format: project:region:instance
        database-name: farmeasy
        instance-connection-name: farmeasy-495005:us-central1:farmeasy-db-instance
  datasource:
    # The Cloud SQL Socket Factory intercepts this URL and routes the connection
    # through the Cloud SQL Auth Proxy via a Unix domain socket.
    # The host portion (///) is intentionally empty; the socket factory resolves it.
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql:///farmeasy?cloudSqlInstance=farmeasy-495005:us-central1:farmeasy-db-instance&socketFactory=com.google.cloud.sql.mysql.SocketFactory&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: FarmEasy-Prod-Pool

logging:
  level:
    root: WARN
    com.frameasy: INFO
    org.springframework.security: WARN
    # Temporarily enabled to capture full bean initialization trace during deployment.
    # Remove or set to WARN once the production deployment is confirmed stable.
    org.springframework: DEBUG
