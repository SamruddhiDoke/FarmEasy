# ============================================================
# PRODUCTION PROFILE - Google Cloud Run
# Activated by: SPRING_PROFILES_ACTIVE=prod
# Database: Google Cloud SQL (MySQL) via Unix Socket Factory
#
# Required Cloud Run deployment flags:
#   --add-cloudsql-instances=farmeasy-495005:us-central1:farmeasy-db-instance
#
# Required environment variables (set in Cloud Run service config):
#   SPRING_PROFILES_ACTIVE=prod
#   SPRING_CLOUD_GCP_SQL_ENABLED=true
#   SPRING_DATASOURCE_USERNAME=root
#   SPRING_DATASOURCE_PASSWORD=<secret>
#   JWT_SECRET=<secret>
# ============================================================
spring:
  cloud:
    gcp:
      sql:
        # This re-enables the Cloud SQL EnvironmentPostProcessor for the prod
        # environment. The base config defaults this to false; it is overridden
        # at Cloud Run deployment time via SPRING_CLOUD_GCP_SQL_ENABLED=true.
        database-name: farmeasy
        instance-connection-name: farmeasy-495005:us-central1:farmeasy-db-instance
  datasource:
    # The Cloud SQL Socket Factory resolves the connection via the Unix domain
    # socket injected by the Cloud Run sidecar. The host portion (///) is
    # intentionally left empty; the socket factory populates it at runtime.
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql:///farmeasy?cloudSqlInstance=farmeasy-495005:us-central1:farmeasy-db-instance&socketFactory=com.google.cloud.sql.mysql.SocketFactory&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: FarmEasy-Prod-Pool

logging:
  level:
    root: WARN
    com.frameasy: INFO
    org.springframework.security: WARN
    org.springframework: DEBUG
