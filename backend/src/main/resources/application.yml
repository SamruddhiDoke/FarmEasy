spring:
  application:
    name: frameasy-backend
  # Active profile is controlled by the SPRING_PROFILES_ACTIVE environment variable.
  # Local development: set SPRING_PROFILES_ACTIVE=local (default if not set)
  # Cloud Run production: set SPRING_PROFILES_ACTIVE=prod
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: krushi.app25@gmail.com
    password: kfshcgrgdqiaance
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JSON Web Token configuration
jwt:
  secret: ${JWT_SECRET:FrameasySuperSecretKeyForJWTTokenGeneration2024Production}
  expiration-ms: 86400000

# Government schemes API configuration
schemes:
  api-url: https://api.data.gov.in/resource
  cache-duration-hours: 24

# File storage paths
upload:
  dir: ./uploads
  equipment: equipment
  land: land
  trade: trade

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: WARN
    com.frameasy: DEBUG
    org.springframework.security: INFO
    # Temporarily enabled for startup diagnostics. Remove once stable.
    org.springframework: DEBUG
